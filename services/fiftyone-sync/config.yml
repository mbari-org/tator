# Batch sizes (fallbacks in code: media_id 200, localization 5000, embeddings 32)
media_id_batch_size: 200
localization_batch_size: 5000

# When true, enable S3 upload (applet shows S3 bucket/prefix; sync uploads raw images to S3).
# When false, S3 upload is disabled and the S3 row is hidden in the applet.
is_enterprise: false

# Optional: embeddings and UMAP; batch_size is per-request size for embed service
# embeddings:
#   batch_size: 32
#   embeddings_field: embeddings
#   brain_key: umap_viz
#   umap_seed: 51
#   force_embeddings: false
#   force_umap: false
#   service_url: null
#   project_name: null

# Example: per-project MongoDB URI and FiftyOne app port mapping.
# See containers/fiftyone-sync for the compose stack.
# projects:
#   ObjectDetection:
#     databases:
#       - uri: "mongodb://localhost:27017"
#         port: 5151
#   VideoSegmentation:
#     databases:
#       - uri: "mongodb://localhost:27018"
#         port: 5152
#   #
# Multi-project example (optional second Mongo per project) with a link to the VSS service to compute embeddings.
# Optional per-project: s3_bucket and s3_prefix for raw image upload (sync download dir to S3, then build dataset by class from S3).
# When set, the applet shows S3 bucket/prefix fields (only when token is valid). Use AWS credentials (env or IAM) for upload.
projects:
  "901902-uavs":
    vss_project: "500055-VARS"
    # s3_bucket: "my-bucket"
    # s3_prefix: "fiftyone/raw"
    databases:
      - uri: "mongodb://localhost:27017"
        port: 5151
      # - uri: "mongodb://localhost:27018"
      #   port: 5152
